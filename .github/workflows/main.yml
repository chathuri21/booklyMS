name: Build, test, and deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & test (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: user-service
            path: services/user-service
            env_source: .env.test
            phpstan: true
          - name: appointment-service
            path: services/appointment-service
            env_source: .env.example
            phpstan: false
          - name: notification-service
            path: services/notification-service
            env_source: .env.example
            phpstan: false
          - name: api-gateway
            path: api-gateway
            env_source: .env.example
            phpstan: false

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, pdo_sqlite
        coverage: none
    - name: Copy .env
      run: cp ${{ matrix.env_source }} .env
    - name: Install app
      run: composer install --prefer-dist --no-progress --no-interaction
    - name: Generate app key
      run: php artisan key:generate
    - name: Run PHPStan
      if: matrix.phpstan
      run: vendor/bin/phpstan analyse app
    - name: Run tests
      run: php artisan test

  docker:
    name: Build & push image (${{ matrix.name }})
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: user-service
            path: services/user-service
          - name: appointment-service
            path: services/appointment-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.path }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:${{ github.sha }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}:latest
